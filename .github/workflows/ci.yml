name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Start backend server
        working-directory: backend
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid
          sleep 5

      - name: Show server log
        working-directory: backend
        run: |
          echo "---- SERVER LOG ----"
          cat server.log || echo "No server log found"
          echo "--------------------"

      - name: Wait for backend
        run: |
          for i in {1..20}; do
            curl -s http://localhost:5000/api/dashboard && echo "Backend is up!" && exit 0
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend/server.pid ]; then
            kill $(cat backend/server.pid) || true
          fi